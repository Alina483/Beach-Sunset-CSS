<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beach Sunset</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    
<main class="sunset" aria-label="An animated sunset over the beach">
	<div class="sky">
		<div class="cloud cloud--one"></div>
		<div class="cloud cloud--two"></div>
		<div class="sun"></div>
	</div>

	<div class="ocean">
		<div class="reflection" aria-hidden="true">
		</div>

		<div class="boat" aria-hidden="true">
			<div class="mast"></div>
			<div class="sail sail--left"></div>
			<div class="sail sail--right"></div>
			<div class="hull"></div>
		</div>
	</div>

	<div class="beach">
		<div class="palm" aria-hidden="true">
			<div class="palm__trunk"></div>
			<div class="palm__leaves">
				<i></i><i></i><i></i><i></i><i></i><i></i>
			</div>
		</div>
	</div>
</main>
    <script src="main.js"></script>
  </body>
</html>
