<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="scene">
    <h1 class="title">Frog in the Lake</h1>

    <div class="sun"></div>

    <div class="cloud cloud-one"></div>
    <div class="cloud cloud-two"></div>

    <div class="grass"></div>

    <div class="wave wave-one"></div>
    <div class="wave wave-two"></div>
    <div class="wave wave-three"></div>

    <div class="reeds">
      <div class="reed reed-one"></div>
      <div class="reed reed-two"></div>
      <div class="reed reed-three"></div>
    </div>

    <div class="lily-pad small-pad"></div>
    <div class="lily-pad main-pad"></div>

    <div class="water-ring"></div>

    <div class="frog">
      <div class="leg leg-left"></div>
      <div class="leg leg-right"></div>

      <div class="foot foot-left"></div>
      <div class="foot foot-right"></div>

      <div class="frog-body"></div>

      <div class="frog-head">
        <div class="eye eye-left"></div>
        <div class="eye eye-right"></div>

        <div class="nostril nostril-left"></div>
        <div class="nostril nostril-right"></div>

        <div class="mouth"></div>
      </div>
    </div>
  </main>
</body>
</html>
