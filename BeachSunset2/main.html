<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beach Sunset</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <main class="sunset-scene" aria-label="Tropical city skyline at sunset">
	<div class="sky">
		<div class="sun"></div>
		<div class="cloud cloud-1"></div>
		<div class="cloud cloud-2"></div>
		<div class="cloud cloud-3"></div>
	</div>

	<div class="city" aria-hidden="true">
		<span class="building b1"></span>
		<span class="building b2"></span>
		<span class="building b3"></span>
		<span class="building b4"></span>
		<span class="building b5"></span>
		<span class="building b6"></span>
		<span class="building b7"></span>
		<span class="building b8"></span>
		<span class="building b9"></span>
		<span class="building b10"></span>
		<span class="building b11"></span>
		<span class="building b12"></span>
		<span class="building b13"></span>
		<span class="building b14"></span>
	</div>

	<div class="water">
		<div class="sun-reflection"></div>
		<div class="city-reflection"></div>

		<div class="ripple ripple-1"></div>
		<div class="ripple ripple-2"></div>
		<div class="ripple ripple-3"></div>
	</div>

	<div class="shore"></div>

	<div class="palm palm-left" aria-hidden="true">
		<div class="trunk"></div>

		<div class="leaves">
			<i></i>
			<i></i>
			<i></i>
			<i></i>
			<i></i>
			<i></i>
			<i></i>
			<i></i>
		</div>
	</div>

	<div class="palm palm-right" aria-hidden="true">
		<div class="trunk"></div>

		<div class="leaves">
			<i></i>
			<i></i>
			<i></i>
			<i></i>
			<i></i>
			<i></i>
			<i></i>
			<i></i>
		</div>
	</div>
</main>
 </body>
</html>
